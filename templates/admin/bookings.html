{% extends "base.html" %}
{% block content %}

<h2>All Bookings</h2>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>Booking ID</th>
            <th>User</th>
            <th>Trek</th>
            <th>Status</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody>
        {% for booking in bookings %}
        <tr>
            <td>{{ booking.id }}</td>
            <td>{{ booking.user.name }}</td>
            <td>{{ booking.trek.name }}</td>
            <td>{{ booking.status }}</td>
            <td>{{ booking.booking_date }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
