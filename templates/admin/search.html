{% extends "base.html" %}
{% block content %}

<h2>Search Treks</h2>

<form method="GET">
    <div class="mb-3">
        <input type="text" name="keyword" class="form-control" placeholder="Search Trek..." value="{{ keyword }}">
    </div>
    <button class="btn btn-primary">
        Search
    </button>
</form>
<br>
<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Location</th>
        <th>Status</th>
    </tr>
    {% for trek in treks %}
    <tr>
        <td>{{ trek.id }}</td>
        <td>{{ trek.name }}</td>
        <td>{{ trek.location }}</td>
        <td>{{ trek.status }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
