{% extends "base.html" %}

{% block content %}

<h2>All Treks</h2>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Location</th>
            <th>Difficulty</th>
            <th>Slots</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for trek in treks %}
        <tr>
            <td>{{ trek.id }}</td>
            <td>{{ trek.name }}</td>
            <td>{{ trek.location }}</td>
            <td>{{ trek.difficulty }}</td>
            <td>{{ trek.slots }}</td>
            <td>{{ trek.status }}</td>
            <td>
                <a href="/admin/edit/{{ trek.id }}" class="btn btn-warning btn-sm">
                    Edit
                </a>
                <a href="/admin/assign/{{ trek.id }}" class="btn btn-info btn-sm">
                    Assign Staff
                </a>
                <a href="/admin/delete/{{ trek.id }}" class="btn btn-danger btn-sm">
                    Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
