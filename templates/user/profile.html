{% extends "base.html" %}
{% block content %}

<h2>Edit Profile</h2>

<form method="POST">
    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" class="form-control" value="{{ current_user.name }}">
    </div>
    <div class="mb-3">
        <label>Phone</label>
        <input type="text" name="phone" class="form-control" value="{{ current_user.phone }}">
    </div>
    <button class="btn btn-success">
        Update Profile
    </button>
</form>

{% endblock %}
